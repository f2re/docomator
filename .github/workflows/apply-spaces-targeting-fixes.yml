name: Apply spaces targeting fixes

on:
  push:
    branches:
      - agent/spaces-audience-targeting
    paths:
      - .spaces-fix-ready

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/spaces-audience-targeting
          fetch-depth: 0

      - name: Apply reviewed exact replacements
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int | None = None) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              actual = text.count(old)
              expected = actual if count is None else count
              if actual != expected or actual == 0:
                  raise SystemExit(f'{path}: expected {expected} occurrence(s), found {actual}: {old!r}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          replace(
              'packages/storage/src/spaces.ts',
              '        .get(space.id, actorId) as SpaceActorMembershipRow;',
              '        .get(space.id, actorId) as unknown as SpaceActorMembershipRow;',
              1,
          )
          replace('packages/storage/src/spaces.ts', 'entity.spaceId', 'entity.space_id', 4)
          replace('packages/storage/src/spaces.ts', 'entity.ownershipVersion', 'entity.ownership_version', 1)
          replace('packages/storage/src/spaces.ts', 'entity.entityId', 'entity.entity_id', 1)
          replace('packages/storage/src/spaces.ts', 'entity.displayName', 'entity.display_name', 1)
          replace('packages/storage/src/spaces.ts', 'entity.entityTypeKey', 'entity.entity_type_key', 1)
          replace('packages/storage/src/spaces.ts', 'entity.entityTypeLabel', 'entity.entity_type_label', 1)

          routes = Path('apps/api/src/space-routes.ts')
          text = routes.read_text(encoding='utf-8')
          text = text.replace(
              '  type SpaceRegistry,\n  type SpaceStatus',
              '  type SpaceRegistry,\n  SpaceValidationError,\n  type SpaceStatus',
          )
          text = text.replace(
              'interface EntityParams extends SpaceParams {',
              'interface ActorParams extends SpaceParams {\n  actorId: string;\n}\n\ninterface EntityParams extends SpaceParams {',
          )
          text = text.replace(
              'interface UpsertActorMembershipBody {\n  actorId: string;\n  role: SpaceActorRole;',
              'interface UpsertActorMembershipBody {\n  role: SpaceActorRole;',
          )
          text = text.replace(
              'throw new TypeError("source.groupId is required for group selection");',
              'throw new SpaceValidationError("source.groupId is required for group selection");',
          )
          text = text.replace(
              'throw new TypeError("source.entityIds is required for selected selection");',
              'throw new SpaceValidationError("source.entityIds is required for selected selection");',
          )
          text = text.replace(
              'app.put<{ Params: SpaceParams; Body: UpsertActorMembershipBody }>',
              'app.put<{ Params: ActorParams; Body: UpsertActorMembershipBody }>',
          )
          routes.write_text(text, encoding='utf-8')
          PY
          rm -f .spaces-fix-ready
          git diff --check

      - name: Commit fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages/storage/src/spaces.ts apps/api/src/space-routes.ts .spaces-fix-ready
          git diff --cached --check
          git commit -m 'fix strict space targeting types'
          git push origin HEAD:agent/spaces-audience-targeting
