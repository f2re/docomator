name: Исправить проверку конфликта координат

on:
  push:
    branches:
      - agent/multi-field-compiler

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Получить рабочую ветку
        uses: actions/checkout@v4
        with:
          ref: agent/multi-field-compiler
          fetch-depth: 0

      - name: Уточнить отрицательный тест
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('packages/template-compiler/src/multi-field.test.ts')
          text = path.read_text(encoding='utf-8')
          old = 'fields: [input.fields[0], { ...input.fields[1], binding: input.fields[0].binding }]'
          new = '''fields: [
            input.fields[0],
            {
              ...input.fields[1],
              elementId: input.fields[0].elementId,
              binding: input.fields[0].binding
            }
          ]'''
          if old not in text:
              raise SystemExit('Не найден ожидаемый фрагмент теста')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check

      - name: Зафиксировать исправление
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages/template-compiler/src/multi-field.test.ts
          git commit -m 'Исправить проверку повторяющейся координаты'
          git push origin HEAD:agent/multi-field-compiler
