name: Финализировать пробное заполнение

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/trial-scalar-render' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Получить рабочую ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Применить проверенную синхронизацию
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ ! -f scripts/ci/finalize-trial-render.py ]]; then
            echo 'Полезная нагрузка уже применена.'
            exit 0
          fi
          python3 scripts/ci/finalize-trial-render.py
          rm -f scripts/ci/finalize-trial-render.py
          python3 - <<'PY'
          from pathlib import Path

          for name in (
              'README.md',
              'docs/IMPLEMENTATION_PLAN.md',
              'docs/REQUIREMENTS.md',
              'docs/TECHNICAL_SPECIFICATION.md',
          ):
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              ending = '\n' if text.endswith('\n') else ''
              path.write_text(
                  '\n'.join(line.rstrip() for line in text.splitlines()) + ending,
                  encoding='utf-8',
              )
          PY
          git diff --check

      - name: Зафиксировать изменения
        shell: bash
        run: |
          set -Eeuo pipefail
          git add --all
          if git diff --cached --quiet; then
            echo 'Изменений нет.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Актуализировать пробное заполнение и требования'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
