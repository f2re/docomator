name: Run one-time spaces documentation patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-spaces-docs-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/spaces-audience-targeting
          fetch-depth: 0

      - name: Normalize and apply reviewed patch
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          target = Path('scripts/ci/apply-spaces-docs.py')
          text = target.read_text(encoding='utf-8')
          start = text.index('    smoke = clean("""')
          end = text.index('    text = text.replace(marker', start)
          replacement = '''    smoke = "\\n".join([
              'curl --fail --silent --show-error "http://127.0.0.1:${DOCOMATOR_PORT}/" | grep -F \'Пространства\' >/dev/null',
              'curl --fail --silent --show-error "http://127.0.0.1:${DOCOMATOR_PORT}/api/v1/spaces?limit=10" | grep -F \'Основное пространство\' >/dev/null',
          ])
'''
          target.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY
          python3 scripts/ci/apply-spaces-docs.py
          rm -f scripts/ci/apply-spaces-docs.py
          node --check apps/api/ui/app.js
          bash -n scripts/offline/first-run.sh
          bash -n scripts/offline/prepare-bundle.sh
          bash -n scripts/offline/install.sh
          bash -n scripts/offline/smoke-test.sh
          git diff --check

      - name: Refresh lockfile
        shell: bash
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit and push feature branch
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'document spaces audiences and first-run flow'
          git push origin HEAD:agent/spaces-audience-targeting
