name: Refresh persistence kernel PR metadata

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/persistence-kernel'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout persistence branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Refresh lockfile and project status
        shell: bash
        run: |
          set -Eeuo pipefail
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

          python3 - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old!r}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace(
              "README.md",
              '[![Status: bootstrap](https://img.shields.io/badge/status-bootstrap-1f6feb)](#-текущее-состояние)',
              '[![Status: persistence kernel](https://img.shields.io/badge/status-persistence%20kernel-1f6feb)](#-текущее-состояние)',
          )
          replace(
              "README.md",
              '> Проект находится на этапе bootstrap. Уже работают каркас API/worker, первичная схема SQLite, миграции, проверки и офлайн-упаковка. Универсальный DOCX/XLSX renderer, Template Studio, планировщик и delivery-коннекторы находятся в roadmap и ещё не заявлены как готовые функции.',
              '> Проект находится на этапе persistence kernel. Уже работают API/worker bootstrap, SQLite unit-of-work, типизированные projections, content-addressed storage, persistent queue, transactional outbox, audit, миграции и офлайн-упаковка. DOCX/XLSX renderer, Template Studio, scheduler и delivery-коннекторы находятся в roadmap и ещё не заявлены как готовые функции.',
          )
          replace(
              "README.md",
              '| SQLite | 🟡 | migration runner и начальная схема домена |',
              '| Persistence kernel | 🟡 | SQLite transactions, typed codecs, object storage, queue, outbox и audit |',
          )
          replace(
              "README.md",
              '| Automation engine | ⬜ | схема зафиксирована, исполнение запланировано |',
              '| Automation engine | 🟡 | persistent queue/outbox готовы; scheduler и rules запланированы |',
          )
          replace(
              "README.md",
              'packages/contracts/     общие контракты\n',
              'packages/contracts/     общие контракты\npackages/storage/       SQLite, queue, outbox, audit и object storage\n',
          )
          replace(
              "README.md",
              '- [Roadmap](docs/ROADMAP.md)\n',
              '- [Roadmap](docs/ROADMAP.md)\n- [Persistence kernel](docs/PERSISTENCE_KERNEL.md)\n',
          )

          replace(
              "docs/ROADMAP.md",
              '| M1 Persistence kernel | ⬜ | repositories, typed properties, queue, outbox, audit |',
              '| M1 Persistence kernel | 🟡 | storage kernel, typed properties, queue, outbox, audit |',
          )
          replace("docs/ROADMAP.md", '- [ ] Merge bootstrap PR', '- [x] Merge bootstrap PR')
          for item in (
              'Storage transaction API and unit-of-work',
              'Typed property codec registry',
              'Content-addressed object storage',
              'Worker queue claim and lease renewal',
              'Retry/dead-letter policies',
              'Transactional outbox',
              'Correlation-aware audit service',
          ):
              replace("docs/ROADMAP.md", f'- [ ] {item}', f'- [x] {item}')

          replace(
              "docs/ARCHITECTURE.md",
              'EAV без типов не используется. Значение хранится в JSON в bootstrap-схеме, но repository layer обязан валидировать его по `property_definitions.value_type`; при появлении измеренного bottleneck допускается выделение typed projection columns новой migration.',
              'EAV без типов не используется. `value_json` остаётся каноническим сериализованным представлением, а migration `0002_persistence_kernel.sql` добавляет индексируемые typed projection columns. Repository layer обязан валидировать значение через codec registry до записи.',
          )
          replace(
              "docs/ARCHITECTURE.md",
              '`worker_jobs` использует состояния `pending`, `running`, `retry`, `complete`, `dead`.',
              '`worker_jobs` использует состояния `pending`, `running`, `retry`, `completed`, `dead_letter`.',
          )
          replace(
              "docs/ARCHITECTURE.md",
              'Worker periodically reclaims expired leases. LLM concurrency по умолчанию — 1.',
              'Worker periodically reclaims expired leases. Завершение и retry требуют действующего lease текущего worker. LLM concurrency по умолчанию — 1. Подробный контракт: [PERSISTENCE_KERNEL.md](PERSISTENCE_KERNEL.md).',
          )
          PY

      - name: Commit generated lockfile and status updates
        shell: bash
        run: |
          set -Eeuo pipefail
          git add package-lock.json README.md docs/ROADMAP.md docs/ARCHITECTURE.md
          if git diff --cached --quiet; then
            echo 'Generated files are current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'refresh persistence lockfile and roadmap'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
