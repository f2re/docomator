name: Apply reviewed spaces documentation patch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/spaces-audience-targeting'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply reviewed patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python3 - <<'PY'
            from pathlib import Path

            target = Path('scripts/ci/apply-spaces-docs.py')
            text = target.read_text(encoding='utf-8')
            start = text.index('    smoke = clean("""')
            end = text.index('    text = text.replace(marker', start)
            replacement = '''    smoke = "\\n".join([
                'curl --fail --silent --show-error "http://127.0.0.1:${DOCOMATOR_PORT}/" | grep -F \'Пространства\' >/dev/null',
                'curl --fail --silent --show-error "http://127.0.0.1:${DOCOMATOR_PORT}/api/v1/spaces?limit=10" | grep -F \'Основное пространство\' >/dev/null',
            ])
'''
            target.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
            PY
            python3 scripts/ci/apply-spaces-docs.py
            rm -f scripts/ci/apply-spaces-docs.py
            node --check apps/api/ui/app.js
            bash -n scripts/offline/first-run.sh
            bash -n scripts/offline/prepare-bundle.sh
            bash -n scripts/offline/install.sh
            bash -n scripts/offline/smoke-test.sh
            git diff --check
          } > spaces-docs-patch.log 2>&1

      - name: Upload patch diagnostic
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: spaces-docs-patch-diagnostic
          path: spaces-docs-patch.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after failed patch
        if: steps.patch.outcome == 'failure'
        shell: bash
        run: |
          cat spaces-docs-patch.log
          exit 1

      - name: Refresh lockfile
        shell: bash
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit updates
        shell: bash
        run: |
          set -Eeuo pipefail
          git add --all
          if git diff --cached --quiet; then
            echo 'Documentation and helper files are current.'
            exit 0
          fi
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'document spaces audiences and first-run flow'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
