name: Финализировать предварительный просмотр и активацию

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/template-preview-activation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Получить рабочую ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Применить синхронизацию
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ ! -f scripts/ci/finalize-preview-activation.py ]]; then
            echo 'Синхронизация уже применена.' | tee finalize-preview.log
            exit 0
          fi
          python3 scripts/ci/finalize-preview-activation.py 2>&1 | tee finalize-preview.log
          rm -f scripts/ci/finalize-preview-activation.py .finalize-preview-ready
          python3 - <<'PY'
          from pathlib import Path

          for name in (
              'README.md',
              'docs/ROADMAP.md',
              'docs/IMPLEMENTATION_PLAN.md',
              'docs/REQUIREMENTS.md',
              'docs/TECHNICAL_SPECIFICATION.md',
              'docs/TEMPLATE_COMPILER.md',
              'docs/OFFLINE_DEPLOYMENT.md',
              'docs/NEXT_ITERATIONS.md',
              'docs/TEMPLATE_ACTIVATION.md',
          ):
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              path.write_text(
                  '\n'.join(line.rstrip() for line in text.splitlines()) + '\n',
                  encoding='utf-8',
              )
          PY
          git diff --check 2>&1 | tee -a finalize-preview.log

      - name: Сохранить диагностику
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: finalize-preview-diagnostic
          path: finalize-preview.log
          if-no-files-found: error
          retention-days: 3

      - name: Остановиться после ошибки синхронизации
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Зафиксировать изменения
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f finalize-preview.log
          git add --all
          if git diff --cached --quiet; then
            echo 'Изменений нет.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Актуализировать предварительный просмотр и активацию'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
