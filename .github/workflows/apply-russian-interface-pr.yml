name: Apply Russian interface branch

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/russian-interface-and-cleanup'
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false

      - name: Normalize documentation marker
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          target = Path('scripts/ci/apply-russian-interface.py')
          text = target.read_text(encoding='utf-8')
          text = text.replace(
              '    "## Цель",\n',
              '    "`manifest.sha256` покрывает все файлы, кроме самого manifest.",\n',
              1,
          )
          target.write_text(text, encoding='utf-8')
          PY

      - name: Apply reviewed text and installation changes
        shell: bash
        run: python3 scripts/ci/apply-russian-interface.py

      - name: Remove one-time helpers
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f scripts/ci/apply-russian-interface.py .russian-interface-ready
          chmod 0755 scripts/offline/first-run.sh

      - name: Validate browser JavaScript
        run: node --check apps/api/ui/app.js

      - name: Validate shell scripts
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n scripts/offline/lib.sh
          bash -n scripts/offline/first-run.sh
          bash -n scripts/offline/prepare-bundle.sh
          bash -n scripts/offline/install.sh
          bash -n scripts/offline/smoke-test.sh

      - name: Validate patch whitespace
        id: whitespace
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          git diff --check 2>&1 | tee whitespace-check.log

      - name: Upload whitespace diagnostic
        if: steps.whitespace.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: russian-interface-whitespace-diagnostic
          path: whitespace-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after whitespace failure
        if: steps.whitespace.outcome == 'failure'
        run: exit 1

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Refresh lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify repository
        run: npm run check

      - name: Smoke-test migrations
        env:
          DOCOMATOR_DATA_DIR: ${{ runner.temp }}/docomator-russian-interface
        run: npm run migrate

      - name: Commit applied changes
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'complete Russian user interface and installation guidance'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
