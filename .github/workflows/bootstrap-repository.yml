name: Bootstrap repository branch

on:
  push:
    branches:
      - agent/bootstrap-docomator
    paths:
      - .bootstrap-ready

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          ref: agent/bootstrap-docomator
          fetch-depth: 0

      - name: Expand reviewed bootstrap payload
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f .bootstrap-payload.b64
          base64 --decode .bootstrap-payload.b64 > /tmp/docomator-bootstrap.tar.xz
          tar -xJf /tmp/docomator-bootstrap.tar.xz
          rm -f .bootstrap-payload.b64 .bootstrap-ready
          rm -f .github/workflows/bootstrap-repository.yml
          git diff --check

      - name: Commit bootstrap
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "bootstrap Docomator platform"
          git push origin HEAD:agent/bootstrap-docomator
