name: Repair spaces targeting branch

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/spaces-audience-targeting'
    runs-on: ubuntu-24.04
    timeout-minutes: 8

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply strict TypeScript fixes
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          spaces = Path('packages/storage/src/spaces.ts')
          text = spaces.read_text(encoding='utf-8')
          replacements = {
              '.get(space.id, actorId) as SpaceActorMembershipRow;': '.get(space.id, actorId) as unknown as SpaceActorMembershipRow;',
              'entity.spaceId': 'entity.space_id',
              'entity.ownershipVersion': 'entity.ownership_version',
              'entity.entityId': 'entity.entity_id',
              'entity.displayName': 'entity.display_name',
              'entity.entityTypeKey': 'entity.entity_type_key',
              'entity.entityTypeLabel': 'entity.entity_type_label',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected spaces.ts text is missing: {old}')
              text = text.replace(old, new)
          spaces.write_text(text, encoding='utf-8')

          routes = Path('apps/api/src/space-routes.ts')
          text = routes.read_text(encoding='utf-8')
          replacements = {
              '  type SpaceRegistry,\n  type SpaceStatus': '  type SpaceRegistry,\n  SpaceValidationError,\n  type SpaceStatus',
              'interface EntityParams extends SpaceParams {': 'interface ActorParams extends SpaceParams {\n  actorId: string;\n}\n\ninterface EntityParams extends SpaceParams {',
              'interface UpsertActorMembershipBody {\n  actorId: string;\n  role: SpaceActorRole;': 'interface UpsertActorMembershipBody {\n  role: SpaceActorRole;',
              'throw new TypeError("source.groupId is required for group selection");': 'throw new SpaceValidationError("source.groupId is required for group selection");',
              'throw new TypeError("source.entityIds is required for selected selection");': 'throw new SpaceValidationError("source.entityIds is required for selected selection");',
              'app.put<{ Params: SpaceParams; Body: UpsertActorMembershipBody }>': 'app.put<{ Params: ActorParams; Body: UpsertActorMembershipBody }>',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected space-routes.ts text is missing: {old}')
              text = text.replace(old, new)
          routes.write_text(text, encoding='utf-8')
          PY
          rm -f .spaces-fix-ready .github/workflows/apply-spaces-targeting-fixes.yml
          git diff --check

      - name: Commit repair
        shell: bash
        run: |
          set -Eeuo pipefail
          git add --all
          if git diff --cached --quiet; then
            echo 'Branch already repaired.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --check
          git commit -m 'fix strict spaces targeting types'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
