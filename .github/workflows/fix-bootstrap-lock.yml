name: Repair bootstrap lockfile

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/bootstrap-docomator'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Repair integrity checksum and push
        shell: bash
        run: |
          set -Eeuo pipefail
          sed -i 's/ACTOURqXjWhV4BA/ACTOURQXjWhV4BA/' package-lock.json
          grep -F 'ACTOURQXjWhV4BA' package-lock.json >/dev/null
          if git diff --quiet -- package-lock.json; then
            echo 'Lockfile is already repaired.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'fix package-lock integrity checksum'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
