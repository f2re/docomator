name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, docs, and shell
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify repository
        id: repository_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee repository-check.log

      - name: Upload repository-check diagnostic
        if: steps.repository_check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-registry-check
          path: repository-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after failed repository check
        if: steps.repository_check.outcome == 'failure'
        run: exit 1

      - name: Smoke-test migration on a fresh database
        env:
          DOCOMATOR_DATA_DIR: ${{ runner.temp }}/docomator-data
        run: npm run migrate
