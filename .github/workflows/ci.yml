name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spaces-docs-sync:
    name: Sync spaces docs and install helper
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/spaces-audience-targeting'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Apply reviewed patch
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          target = Path('scripts/ci/apply-spaces-docs.py')
          text = target.read_text(encoding='utf-8')
          start = text.index('    smoke = clean("""')
          end = text.index('    text = text.replace(marker', start)
          replacement = '''    smoke = "\\n".join([
              'curl --fail --silent --show-error "http://127.0.0.1:${DOCOMATOR_PORT}/" | grep -F \'Пространства\' >/dev/null',
              'curl --fail --silent --show-error "http://127.0.0.1:${DOCOMATOR_PORT}/api/v1/spaces?limit=10" | grep -F \'Основное пространство\' >/dev/null',
          ])
'''
          target.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY
          python3 scripts/ci/apply-spaces-docs.py
          rm -f scripts/ci/apply-spaces-docs.py .spaces-docs-ready
          node --check apps/api/ui/app.js
          bash -n scripts/offline/first-run.sh
          bash -n scripts/offline/prepare-bundle.sh
          bash -n scripts/offline/install.sh
          bash -n scripts/offline/smoke-test.sh
          git diff --check

      - name: Refresh lockfile
        shell: bash
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit synchronized files
        shell: bash
        run: |
          set -Eeuo pipefail
          git add --all
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'document spaces audiences and first-run flow'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  verify:
    name: Build, test, docs, and shell
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify repository
        id: repository_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee repository-check.log

      - name: Upload repository-check diagnostic
        if: steps.repository_check.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: repository-check-diagnostic
          path: repository-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Stop after failed repository check
        if: steps.repository_check.outcome == 'failure'
        run: exit 1

      - name: Smoke-test migration on a fresh database
        env:
          DOCOMATOR_DATA_DIR: ${{ runner.temp }}/docomator-data
        run: npm run migrate
