name: Интегрировать единый целевой акт

on:
  push:
    paths:
      - .github/workflows/finalize-target-acceptance.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Получить main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Настроить Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Интегрировать сценарий и документацию
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path_name, old, new):
              path = Path(path_name)
              source = path.read_text(encoding='utf-8')
              if new in source:
                  return
              if old not in source:
                  raise SystemExit(f'Не найден ожидаемый фрагмент: {path_name}')
              path.write_text(source.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'package.json',
              '    "acceptance:ux": "node scripts/runtime/ux-acceptance.mjs",\n',
              '    "acceptance:ux": "node scripts/runtime/ux-acceptance.mjs",\n'
              '    "acceptance:target": "bash scripts/offline/target-acceptance.sh",\n'
          )

          replace_once(
              'scripts/offline/prepare-bundle.sh',
              '  "$SCRIPT_DIR/target-release-gate.sh" \\\n  "$SCRIPT_DIR/ux-acceptance-gate.sh" \\\n',
              '  "$SCRIPT_DIR/target-release-gate.sh" \\\n  "$SCRIPT_DIR/target-acceptance.sh" \\\n  "$SCRIPT_DIR/ux-acceptance-gate.sh" \\\n'
          )

          replace_once(
              'scripts/offline/verify-bundle.sh',
              '[[ -x "$BUNDLE_ROOT/target-release-gate.sh" ]] || \\\n  die "В комплекте отсутствует целевой target-release-gate.sh"\n',
              '[[ -x "$BUNDLE_ROOT/target-release-gate.sh" ]] || \\\n  die "В комплекте отсутствует целевой target-release-gate.sh"\n'
              '[[ -x "$BUNDLE_ROOT/target-acceptance.sh" ]] || \\\n  die "В комплекте отсутствует единый сценарий целевой приёмки"\n'
          )

          readme_section = '''### Единый целевой акт

После установки того же проверенного bundle на чистом стенде весь автоматизированный контур запускается одной командой обычного пользователя:

```bash
install -d -m 0700 "$HOME/docomator-target-acts"
"$BUNDLE_ROOT/target-acceptance.sh" \\
  --config /etc/docomator/docomator.env \\
  --base-url http://127.0.0.1:8080/ \\
  --output "$HOME/docomator-target-acts/debian-01"
```

Для строгого 🟥 Astra Linux-контура добавляются `--require-network --require-smtp`. Сценарий последовательно выполняет проверку bundle, root smoke, настоящий LibreOffice gate, новую контрольную резервную копию, release-bound пилотный акт и offline Playwright/axe. Результат содержит `target-acceptance.json`, все журналы и единый `manifest.sha256`; прежняя копия не может быть принята как доказательство текущего запуска.

'''
          readme = Path('README.md')
          source = readme.read_text(encoding='utf-8')
          if '### Единый целевой акт' not in source:
              marker = 'Проверка:\n\n```bash\n'
              if marker not in source:
                  raise SystemExit('Не найден раздел проверки в README.md')
              source = source.replace(marker, readme_section + marker, 1)
              readme.write_text(source, encoding='utf-8')

          deployment_section = '''## 4.1. Единый прогон целевой приёмки

`target-acceptance.sh` входит в корень полного bundle и запускается обычным пользователем после автономной установки. Bundle должен находиться в доверенном root-owned каталоге, а локальный Docomator — обслуживать тот же `release.json`.

```bash
install -d -m 0700 "$HOME/docomator-target-acts"
"$BUNDLE_ROOT/target-acceptance.sh" \\
  --config /etc/docomator/docomator.env \\
  --base-url http://127.0.0.1:8080/ \\
  --output "$HOME/docomator-target-acts/debian-01"
```

Строгий профиль с обязательными интеграциями:

```bash
"$BUNDLE_ROOT/target-acceptance.sh" \\
  --config /etc/docomator/docomator.env \\
  --base-url http://127.0.0.1:8080/ \\
  --output "$HOME/docomator-target-acts/astra-01" \\
  --require-network \\
  --require-smtp
```

Команда fail-closed выполняет `verify-bundle.sh`, root `smoke-test.sh`, `target-release-gate.sh`, установленный `pilot-check.sh --run-backup` и `ux-acceptance-gate.sh`. Пилотный JSON обязан иметь `status=passed`, ноль блокирующих ошибок и ту же версию/commit/SHA-256 `release.json`; UX metadata обязана совпадать с SHA-256 manifest того же bundle. На выходе создаются `target-acceptance.json`, журналы пяти этапов и `manifest.sha256` всех свидетельств.

'''
          deployment = Path('docs/OFFLINE_DEPLOYMENT.md')
          source = deployment.read_text(encoding='utf-8')
          if '## 4.1. Единый прогон целевой приёмки' not in source:
              marker = '## 5. Перенос\n'
              if marker not in source:
                  raise SystemExit('Не найден раздел переноса в OFFLINE_DEPLOYMENT.md')
              source = source.replace(marker, deployment_section + marker, 1)
              deployment.write_text(source, encoding='utf-8')

          pilot_section = '''## Единый автоматизированный прогон

Для чистого Debian/🟥 Astra Linux-стенда предпочтителен сценарий из корня проверенного bundle. Он не заменяет ручную пользовательскую приёмку и восстановление на отдельной машине, но собирает все машинные доказательства одной командой:

```bash
"$BUNDLE_ROOT/target-acceptance.sh" \\
  --config /etc/docomator/docomator.env \\
  --base-url http://127.0.0.1:8080/ \\
  --output "$HOME/docomator-target-acts/target-01"
```

Для обязательных сетевой папки и SMTP добавьте `--require-network --require-smtp`. Итоговый каталог содержит связанный `target-acceptance.json`, пилотный JSON/Markdown, Playwright/axe, журналы smoke/release-gate и общий checksum manifest.

'''
          pilot = Path('docs/PILOT_ACCEPTANCE.md')
          source = pilot.read_text(encoding='utf-8')
          if '## Единый автоматизированный прогон' not in source:
              marker = '## Запуск\n'
              if marker not in source:
                  raise SystemExit('Не найден раздел запуска в PILOT_ACCEPTANCE.md')
              source = source.replace(marker, pilot_section + marker, 1)
              pilot.write_text(source, encoding='utf-8')

          replace_once(
              'docs/ROADMAP.md',
              '- [x] автономный комплект;\n',
              '- [x] автономный комплект;\n'
              '- [x] единый fail-closed target-acceptance прогон с release-bound актами и checksum manifest;\n'
          )

          next_iterations = Path('docs/NEXT_ITERATIONS.md')
          source = next_iterations.read_text(encoding='utf-8')
          source = source.replace('Последнее обновление: **2026-07-19**', 'Последнее обновление: **2026-07-21**')
          if '| Целевая приёмка |' not in source:
              marker = '| Автоматические копии | ✅ | ежедневный timer, проверка и ограничение хранения |\n'
              row = '| Целевая приёмка | ✅ инструмент | единая команда связывает bundle, LibreOffice, новую backup, пилотный акт и Playwright/axe |\n'
              if marker not in source:
                  raise SystemExit('Не найдена таблица продукта в NEXT_ITERATIONS.md')
              source = source.replace(marker, marker + row, 1)
          next_iterations.write_text(source, encoding='utf-8')

          release_notes = Path('docs/RELEASE_NOTES.md')
          source = release_notes.read_text(encoding='utf-8')
          bullet = '- `target-acceptance.sh` одной fail-closed командой связывает проверку bundle, root smoke, настоящий LibreOffice, новую контрольную копию, пилотный JSON/Markdown и offline Playwright/axe; итоговый каталог имеет собственный SHA-256 manifest.\n'
          if bullet not in source:
              marker = '- `pilot-check.sh` fail-closed сверяет работающий API с установленным релизом и записывает в JSON/Markdown-акт точную версию, Git commit и SHA-256 `release.json`.\n'
              if marker not in source:
                  raise SystemExit('Не найден pilot-check в RELEASE_NOTES.md')
              source = source.replace(marker, marker + bullet, 1)
              release_notes.write_text(source, encoding='utf-8')

          changelog = Path('docs/CHANGELOG.md')
          source = changelog.read_text(encoding='utf-8')
          entry = '''## 2026-07-21 — финализация целевой приёмки

Добавлено:

- единый `target-acceptance.sh` внутри offline bundle;
- последовательный fail-closed запуск verifier, root smoke, core/LibreOffice gate, новой контрольной резервной копии и Playwright/axe;
- `target-acceptance.json` с привязкой к версии, commit, SHA-256 bundle manifest и SHA-256 `release.json`;
- checksum manifest полного каталога свидетельств и отдельные журналы каждого этапа;
- запрет считать старую проверенную копию результатом текущего `--run-backup`.

Фактические Debian/🟥 Astra Linux-акты, ручная P5-приёмка и восстановление на отдельном стенде остаются внешними обязательными действиями.

'''
          if '## 2026-07-21 — финализация целевой приёмки' not in source:
              marker = '# Журнал изменений Docomator\n\n'
              source = source.replace(marker, marker + entry, 1)
              changelog.write_text(source, encoding='utf-8')
          PY

      - name: Установить зависимости
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Проверить целевой сценарий и проект
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n scripts/offline/target-acceptance.sh
          node --test scripts/offline/target-acceptance.test.mjs scripts/runtime/pilot-backup-evidence.test.mjs
          npm run check

      - name: Зафиксировать в main
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/finalize-target-acceptance.yml
          rm -f .github/workflows/finalize-multi-field-version-pr.yml
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Собрать единый целевой акт приёмки'
          git push origin HEAD:main
