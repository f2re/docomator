name: Исправить тип буфера многополевой компиляции

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/multi-field-compiler' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Получить рабочую ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Уточнить тип буфера
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('packages/template-compiler/src/multi-field.ts')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '  let current = source;\n': '  let current: Buffer<ArrayBufferLike> = source;\n',
              '  let current = original;\n': '  let current: Buffer<ArrayBufferLike> = original;\n',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Не найден ожидаемый фрагмент: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .fix-multi-field-buffer
          git diff --check

      - name: Зафиксировать исправление
        shell: bash
        run: |
          set -Eeuo pipefail
          git add --all
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Исправить тип буфера многополевой компиляции'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
