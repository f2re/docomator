name: Исправить интеграцию целевого акта

on:
  push:
    paths:
      - .github/workflows/finalize-target-acceptance-v2.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - name: Интегрировать сценарий
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(name, old, new):
              path = Path(name)
              source = path.read_text(encoding='utf-8')
              if new in source:
                  return
              if old not in source:
                  raise SystemExit(f'Не найден ожидаемый фрагмент: {name}')
              path.write_text(source.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'package.json',
              '    "acceptance:ux": "node scripts/runtime/ux-acceptance.mjs",\n',
              '    "acceptance:ux": "node scripts/runtime/ux-acceptance.mjs",\n'
              '    "acceptance:target": "bash scripts/offline/target-acceptance.sh",\n'
          )
          replace_once(
              'scripts/offline/prepare-bundle.sh',
              '  "$SCRIPT_DIR/target-release-gate.sh" \\\n  "$SCRIPT_DIR/ux-acceptance-gate.sh" \\\n',
              '  "$SCRIPT_DIR/target-release-gate.sh" \\\n  "$SCRIPT_DIR/target-acceptance.sh" \\\n  "$SCRIPT_DIR/ux-acceptance-gate.sh" \\\n'
          )
          replace_once(
              'scripts/offline/verify-bundle.sh',
              '[[ -f "$BUNDLE_ROOT/http-check.mjs" ]] || die "В комплекте отсутствует локальная HTTP-проверка"\n',
              '[[ -f "$BUNDLE_ROOT/http-check.mjs" ]] || die "В комплекте отсутствует локальная HTTP-проверка"\n'
              '[[ -x "$BUNDLE_ROOT/target-acceptance.sh" ]] || die "В комплекте отсутствует единый сценарий целевой приёмки"\n'
          )
          replace_once(
              'scripts/offline/verify-bundle.test.mjs',
              '    "target-release-gate.sh",\n    "ux-acceptance-gate.sh",\n',
              '    "target-release-gate.sh",\n    "target-acceptance.sh",\n    "ux-acceptance-gate.sh",\n'
          )
          replace_once(
              'scripts/offline/verify-bundle.test.mjs',
              '  await chmod(path.join(bundle, "target-release-gate.sh"), 0o755);\n  await chmod(path.join(bundle, "ux-acceptance-gate.sh"), 0o755);\n',
              '  await chmod(path.join(bundle, "target-release-gate.sh"), 0o755);\n'
              '  await chmod(path.join(bundle, "target-acceptance.sh"), 0o755);\n'
              '  await chmod(path.join(bundle, "ux-acceptance-gate.sh"), 0o755);\n'
          )

          readme = Path('README.md')
          source = readme.read_text(encoding='utf-8')
          if '### Единый целевой акт' not in source:
              section = '''### Единый целевой акт

После установки того же проверенного bundle весь автоматизированный контур запускается одной командой обычного пользователя:

```bash
install -d -m 0700 "$HOME/docomator-target-acts"
"$BUNDLE_ROOT/target-acceptance.sh" \\
  --config /etc/docomator/docomator.env \\
  --base-url http://127.0.0.1:8080/ \\
  --output "$HOME/docomator-target-acts/debian-01"
```

Для строгого 🟥 Astra Linux-контура добавляются `--require-network --require-smtp`. Сценарий последовательно выполняет проверку bundle, root smoke, настоящий LibreOffice gate, новую контрольную резервную копию, release-bound пилотный акт и offline Playwright/axe. Результат содержит `target-acceptance.json`, журналы и единый `manifest.sha256`.

'''
              marker = 'Проверка:\n\n```bash\n'
              if marker not in source:
                  raise SystemExit('Не найден раздел проверки README')
              readme.write_text(source.replace(marker, section + marker, 1), encoding='utf-8')

          deployment = Path('docs/OFFLINE_DEPLOYMENT.md')
          source = deployment.read_text(encoding='utf-8')
          if '## 4.1. Единый прогон целевой приёмки' not in source:
              section = '''## 4.1. Единый прогон целевой приёмки

После автономной установки выполните из того же доверенного bundle:

```bash
install -d -m 0700 "$HOME/docomator-target-acts"
"$BUNDLE_ROOT/target-acceptance.sh" \\
  --config /etc/docomator/docomator.env \\
  --base-url http://127.0.0.1:8080/ \\
  --output "$HOME/docomator-target-acts/target-01"
```

Для обязательных сетевой папки и SMTP добавьте `--require-network --require-smtp`. Команда fail-closed выполняет verifier, root smoke, core/LibreOffice release-gate, установленный `pilot-check.sh --run-backup` и offline Playwright/axe. Пилот и UX metadata обязаны относиться к тому же commit и SHA-256 bundle/release metadata. Итог содержит `target-acceptance.json`, отдельные журналы и checksum manifest всех свидетельств.

'''
              marker = '## 5. Перенос\n'
              if marker not in source:
                  raise SystemExit('Не найден раздел переноса')
              deployment.write_text(source.replace(marker, section + marker, 1), encoding='utf-8')

          pilot = Path('docs/PILOT_ACCEPTANCE.md')
          source = pilot.read_text(encoding='utf-8')
          if '## Единый автоматизированный прогон' not in source:
              section = '''## Единый автоматизированный прогон

Для чистого Debian/🟥 Astra Linux-стенда предпочтителен сценарий из корня проверенного bundle:

```bash
"$BUNDLE_ROOT/target-acceptance.sh" \\
  --config /etc/docomator/docomator.env \\
  --base-url http://127.0.0.1:8080/ \\
  --output "$HOME/docomator-target-acts/target-01"
```

Для строгого контура добавьте `--require-network --require-smtp`. Автоматический акт не заменяет ручную P5-приёмку и восстановление на отдельном стенде.

'''
              marker = '## Запуск\n'
              pilot.write_text(source.replace(marker, section + marker, 1), encoding='utf-8')

          roadmap = Path('docs/ROADMAP.md')
          source = roadmap.read_text(encoding='utf-8')
          line = '- [x] единый fail-closed target-acceptance прогон с release-bound актами и checksum manifest;\n'
          if line not in source:
              source = source.replace('- [x] автономный комплект;\n', '- [x] автономный комплект;\n' + line, 1)
              roadmap.write_text(source, encoding='utf-8')

          notes = Path('docs/RELEASE_NOTES.md')
          source = notes.read_text(encoding='utf-8')
          line = '- `target-acceptance.sh` одной fail-closed командой связывает проверку bundle, root smoke, настоящий LibreOffice, новую контрольную копию, пилотный JSON/Markdown и offline Playwright/axe.\n'
          marker = '- `pilot-check.sh` fail-closed сверяет работающий API с установленным релизом и записывает в JSON/Markdown-акт точную версию, Git commit и SHA-256 `release.json`.\n'
          if line not in source:
              notes.write_text(source.replace(marker, marker + line, 1), encoding='utf-8')

          changelog = Path('docs/CHANGELOG.md')
          source = changelog.read_text(encoding='utf-8')
          if '## 2026-07-21 — единый целевой акт' not in source:
              entry = '''## 2026-07-21 — единый целевой акт

- добавлен `target-acceptance.sh` с последовательным verifier, root smoke, LibreOffice gate, новой контрольной копией и Playwright/axe;
- итоговый `target-acceptance.json` связан с commit и SHA-256 bundle/release metadata;
- каталог доказательств получает собственный `manifest.sha256`.

'''
              changelog.write_text(source.replace('# Журнал изменений Docomator\n\n', '# Журнал изменений Docomator\n\n' + entry, 1), encoding='utf-8')
          PY
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Полная проверка
        shell: bash
        run: |
          set -Eeuo pipefail
          bash -n scripts/offline/target-acceptance.sh
          node --test scripts/offline/target-acceptance.test.mjs scripts/runtime/pilot-backup-evidence.test.mjs
          npm run check
      - name: Зафиксировать main
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/finalize-target-acceptance.yml
          rm -f .github/workflows/finalize-target-acceptance-v2.yml
          rm -f .github/workflows/finalize-multi-field-version-pr.yml
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Собрать единый целевой акт приёмки'
          git push origin HEAD:main
