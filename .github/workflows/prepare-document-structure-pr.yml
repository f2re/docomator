name: Подготовить структурное представление документов

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/document-structure'
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Получить рабочую ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false

      - name: Проверить необходимость подготовки
        id: payload
        shell: bash
        run: |
          if compgen -G '.structure-payload.part-*' >/dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Развернуть подготовленные изменения
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf /tmp/docomator-structure-update
          mkdir -p /tmp/docomator-structure-update
          cat .structure-payload.part-* | base64 --decode > /tmp/docomator-structure-update.tar.gz
          sha256sum /tmp/docomator-structure-update.tar.gz
          tar -tzf /tmp/docomator-structure-update.tar.gz
          tar -xzf /tmp/docomator-structure-update.tar.gz -C /tmp/docomator-structure-update
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/docomator-structure-update/apply.py')
          source = path.read_text(encoding='utf-8')
          for needle, replacement in (
              ('            patch_ui(repo)\n', '            # Интерфейс подключается устойчивыми малыми изменениями ниже.\n'),
              ('            patch_docs(repo)\n', '            # Документация обновляется отдельно после проверки кода.\n'),
          ):
              if needle not in source:
                  raise SystemExit(f'Не найден ожидаемый вызов: {needle.strip()}')
              source = source.replace(needle, replacement, 1)
          path.write_text(source, encoding='utf-8')
          PY
          python3 /tmp/docomator-structure-update/apply.py

          python3 - <<'PY'
          import json
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding='utf-8')

          def write(path: str, value: str) -> None:
              Path(path).write_text(value, encoding='utf-8')

          index_path = 'apps/api/ui/index.html'
          index = read(index_path)
          if '/ui/document-structure.js' not in index:
              marker = '    <script type="module" src="/ui/document-intake.js"></script>'
              if marker not in index:
                  raise SystemExit('Не найдено подключение модуля проверки документов')
              index = index.replace(
                  marker,
                  marker + '\n    <script type="module" src="/ui/document-structure.js"></script>',
                  1,
              )
              write(index_path, index)

          intake_path = 'apps/api/ui/document-intake.js'
          intake = read(intake_path)
          if 'docomator:document-inspected' not in intake:
              marker = '    renderReport(body.data, body.correlationId);'
              if marker not in intake:
                  raise SystemExit('Не найдено завершение проверки документа')
              intake = intake.replace(
                  marker,
                  marker + '''\n    document.dispatchEvent(\n      new CustomEvent("docomator:document-inspected", {\n        detail: {\n          file: selectedFile,\n          report: body.data,\n          operationId: body.correlationId\n        }\n      })\n    );''',
                  1,
              )
              write(intake_path, intake)

          routes_path = 'apps/api/src/ui-routes.ts'
          routes = read(routes_path)
          old_css = 'appendFileNames: ["spaces.css", "intake.css", "quarantine.css"],'
          new_css = 'appendFileNames: ["spaces.css", "intake.css", "quarantine.css", "structure.css"],'
          if '"structure.css"' not in routes:
              if old_css not in routes:
                  raise SystemExit('Не найден список файлов оформления')
              routes = routes.replace(old_css, new_css, 1)
          if '"/ui/document-structure.js"' not in routes:
              marker = '''  "/ui/document-intake.js": {\n    fileName: "document-intake.js",\n    contentType: "text/javascript; charset=utf-8",\n    cacheControl: "private, max-age=3600"\n  },'''
              addition = marker + '''\n  "/ui/document-structure.js": {\n    fileName: "document-structure.js",\n    contentType: "text/javascript; charset=utf-8",\n    cacheControl: "private, max-age=3600"\n  },'''
              if marker not in routes:
                  raise SystemExit('Не найден маршрут модуля проверки документов')
              routes = routes.replace(marker, addition, 1)
          write(routes_path, routes)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          check_ui = package['scripts']['check:ui']
          command = 'node --check apps/api/ui/document-structure.js'
          if command not in check_ui:
              package['scripts']['check:ui'] = check_ui + ' && ' + command
          package_path.write_text(
              json.dumps(package, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          language_path = 'scripts/ci/check-user-facing-language.mjs'
          language = read(language_path)
          if 'apps/api/ui/document-structure.js' not in language:
              marker = '  "apps/api/ui/document-intake.js",'
              if marker not in language:
                  raise SystemExit('Не найден список пользовательских файлов')
              language = language.replace(
                  marker,
                  marker + '\n  "apps/api/ui/document-structure.js",',
                  1,
              )
              write(language_path, language)
          PY

          rm -f .structure-payload.part-* .apply-document-structure .apply-document-structure-v2
          git diff --check

      - name: Определить версию Node.js
        if: steps.payload.outputs.present == 'true'
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Установить Node.js
        if: steps.payload.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Установить зафиксированные зависимости
        if: steps.payload.outputs.present == 'true'
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Проверить весь репозиторий
        if: steps.payload.outputs.present == 'true'
        run: npm run check

      - name: Проверить миграции на чистой базе
        if: steps.payload.outputs.present == 'true'
        env:
          DOCOMATOR_DATA_DIR: ${{ runner.temp }}/docomator-document-structure
        run: npm run migrate

      - name: Зафиксировать проверенный этап
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all -- . ':(exclude).github/workflows/**'
          git diff --cached --check
          git commit -m 'add deterministic DOCX and XLSX structure analysis'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
