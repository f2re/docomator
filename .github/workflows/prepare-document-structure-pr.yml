name: Подготовить структурное представление документов

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/document-structure'
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Получить рабочую ветку
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          show-progress: false

      - name: Проверить необходимость подготовки
        id: payload
        shell: bash
        run: |
          if compgen -G '.structure-payload.part-*' >/dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Развернуть подготовленные изменения
        if: steps.payload.outputs.present == 'true'
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            set -Eeuo pipefail
            rm -rf /tmp/docomator-structure-update
            mkdir -p /tmp/docomator-structure-update
            cat .structure-payload.part-* | base64 --decode > /tmp/docomator-structure-update.tar.gz
            sha256sum /tmp/docomator-structure-update.tar.gz
            tar -tzf /tmp/docomator-structure-update.tar.gz
            tar -xzf /tmp/docomator-structure-update.tar.gz -C /tmp/docomator-structure-update
            python3 - <<'PY'
            from pathlib import Path
            path = Path('/tmp/docomator-structure-update/apply.py')
            source = path.read_text(encoding='utf-8')
            needle = '            patch_docs(repo)\n'
            if needle not in source:
                raise SystemExit('Не найден вызов обновления документации')
            path.write_text(
                source.replace(
                    needle,
                    '            # Документация обновляется отдельно после проверки кода.\n',
                    1,
                ),
                encoding='utf-8',
            )
            PY
            python3 /tmp/docomator-structure-update/apply.py
            rm -f .structure-payload.part-* .apply-document-structure .apply-document-structure-v2
            git diff --check
          } 2>&1 | tee document-structure-apply.log

      - name: Сохранить журнал подготовки
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: document-structure-apply
          path: document-structure-apply.log
          if-no-files-found: error
          retention-days: 3

      - name: Остановиться после ошибки подготовки
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Определить версию Node.js
        if: steps.payload.outputs.present == 'true'
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Установить Node.js
        if: steps.payload.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Установить зафиксированные зависимости
        if: steps.payload.outputs.present == 'true'
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Проверить весь репозиторий
        if: steps.payload.outputs.present == 'true'
        run: npm run check

      - name: Проверить миграции на чистой базе
        if: steps.payload.outputs.present == 'true'
        env:
          DOCOMATOR_DATA_DIR: ${{ runner.temp }}/docomator-document-structure
        run: npm run migrate

      - name: Зафиксировать проверенный этап
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all -- . ':(exclude).github/workflows/**'
          git diff --cached --check
          git commit -m 'add deterministic DOCX and XLSX structure analysis'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
