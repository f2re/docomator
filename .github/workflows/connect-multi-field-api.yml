name: Подключить многополевой API

on:
  push:
    branches:
      - agent/multi-field-test-version

permissions:
  contents: write

jobs:
  connect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Получить рабочую ветку
        uses: actions/checkout@v4
        with:
          ref: agent/multi-field-test-version
          fetch-depth: 0

      - name: Подключить маршруты, схему и ошибки
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path

          app = Path('apps/api/src/app.ts')
          text = app.read_text(encoding='utf-8')
          text = text.replace(
              '  KnowledgeValidationError,\n',
              '  KnowledgeValidationError,\n  MultiFieldTestVersionConflictError,\n  MultiFieldTestVersionNotFoundError,\n  MultiFieldTestVersionRegistry,\n  MultiFieldTestVersionValidationError,\n',
              1,
          )
          text = text.replace(
              'import { registerKnowledgeRoutes } from "./knowledge-routes.js";\n',
              'import { registerKnowledgeRoutes } from "./knowledge-routes.js";\nimport { registerMultiFieldTestVersionRoutes } from "./multi-field-test-version-routes.js";\n',
              1,
          )
          text = text.replace(
              '  templateTestVersionRegistry?: TemplateTestVersionRegistry;\n',
              '  templateTestVersionRegistry?: TemplateTestVersionRegistry;\n  multiFieldTestVersionRegistry?: MultiFieldTestVersionRegistry;\n',
              1,
          )
          text = text.replace(
              '        "template_test_versions",\n',
              '        "template_test_versions",\n        "template_multi_test_versions",\n        "template_multi_test_version_fields",\n',
              1,
          )
          text = text.replace(
              "              'template_draft_fields', 'template_test_versions',\n",
              "              'template_draft_fields', 'template_test_versions',\n              'template_multi_test_versions', 'template_multi_test_version_fields',\n",
              1,
          )
          text = text.replace(
              '  const templatePreviewActivationRegistry =\n',
              '  const multiFieldTestVersionRegistry =\n    dependencies.multiFieldTestVersionRegistry ??\n    new MultiFieldTestVersionRegistry(store, objectStore);\n  const templatePreviewActivationRegistry =\n',
              1,
          )
          text = text.replace(
              '    } else if (error instanceof TemplateTestVersionValidationError) {\n',
              '    } else if (error instanceof MultiFieldTestVersionValidationError) {\n      statusCode = 400;\n      code = "multi_field_test_version_validation_failed";\n      message = toUserMessage(error);\n    } else if (error instanceof MultiFieldTestVersionNotFoundError) {\n      statusCode = 404;\n      code = "multi_field_test_version_not_found";\n      message = toUserMessage(error);\n    } else if (error instanceof MultiFieldTestVersionConflictError) {\n      statusCode = 409;\n      code = "multi_field_test_version_conflict";\n      message = toUserMessage(error);\n    } else if (error instanceof TemplateTestVersionValidationError) {\n',
              1,
          )
          text = text.replace(
              '  registerTemplatePreviewActivationRoutes(\n',
              '  registerMultiFieldTestVersionRoutes(\n    app,\n    objectStore,\n    templateDraftRegistry,\n    multiFieldTestVersionRegistry\n  );\n  registerTemplatePreviewActivationRoutes(\n',
              1,
          )
          app.write_text(text, encoding='utf-8')

          messages = Path('apps/api/src/user-message.ts')
          text = messages.read_text(encoding='utf-8')
          text = text.replace(
              '  [/^Compiled and trial documents must not be empty$/i, () =>\n',
              '  [/^Multi-field trial requires at least two saved fields$/i, () =>\n    "Для общей проверки сохраните не менее двух полей черновика."],\n  [/^Multi-field trial supports at most 100 saved fields$/i, () =>\n    "За один проход можно проверить не более 100 полей."],\n  [/^Multi-field trial must provide exactly all draft fields;/i, () =>\n    "Для общей проверки заполните все поля текущего черновика без посторонних идентификаторов."],\n  [/^Duplicate fieldId in multi-field request:/i, () =>\n    "Одно поле передано в общую проверку несколько раз."],\n  [/^One or more template fields were not found in this draft$/i, () =>\n    "Одно или несколько полей не найдены в текущем черновике."],\n  [/^Stored template field changed before multi-field testing:/i, () =>\n    "Поле изменилось после подготовки набора. Обновите черновик и повторите проверку."],\n  [/^Multi-field test format does not match the template draft$/i, () =>\n    "Формат многополевой проверки не совпадает с форматом черновика."],\n  [/^Compiled and trial documents must not be empty$/i, () =>\n',
              1,
          )
          text = text.replace(
              '    "template test version": "Проверенная версия",\n',
              '    "template test version": "Проверенная версия",\n    "multi-field test version": "Многополевая проверенная версия",\n',
              1,
          )
          messages.write_text(text, encoding='utf-8')
          PY
          git diff --check

      - name: Зафиксировать подключение
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/app.ts apps/api/src/user-message.ts
          git commit -m 'Подключить многополевой API и сообщения'
          git push origin HEAD:agent/multi-field-test-version
