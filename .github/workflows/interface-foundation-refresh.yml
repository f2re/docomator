name: Apply interface foundation baseline

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/interface-foundation'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout interface branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Apply reviewed baseline patch
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ -f scripts/ci/apply-interface-baseline.py ]]; then
            python3 scripts/ci/apply-interface-baseline.py
            rm -f scripts/ci/apply-interface-baseline.py
          else
            echo 'Interface baseline patch is already applied.'
          fi

      - name: Refresh lockfile
        shell: bash
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate generated files before commit
        shell: bash
        run: |
          set -Eeuo pipefail
          node --check apps/api/ui/app.js
          bash -n scripts/offline/prepare-bundle.sh
          git diff --check

      - name: Commit generated baseline
        shell: bash
        run: |
          set -Eeuo pipefail
          git add --all
          if git diff --cached --quiet; then
            echo 'Generated files are current.'
            exit 0
          fi
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'apply guided interface baseline to project plan'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
