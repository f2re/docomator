name: Refresh interface foundation metadata

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/interface-foundation'
    runs-on: ubuntu-24.04
    timeout-minutes: 8

    steps:
      - name: Checkout interface branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Refresh lockfile when workspace metadata changed
        shell: bash
        run: |
          set -Eeuo pipefail
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          if git diff --quiet -- package-lock.json; then
            echo 'Lockfile is current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'refresh interface foundation lockfile'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
