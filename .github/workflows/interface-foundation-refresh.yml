name: Expand and refresh interface foundation

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/interface-foundation'
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - name: Checkout interface branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Read Node.js version
        id: node
        shell: bash
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Detect interface payload
        id: payload
        shell: bash
        run: |
          if compgen -G '.interface-payload.part-*' >/dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Decode interface payload
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          cat .interface-payload.part-* | base64 --decode > /tmp/interface-foundation.tar.gz
          ls -lh /tmp/interface-foundation.tar.gz
          sha256sum /tmp/interface-foundation.tar.gz

      - name: Verify interface payload checksum
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: echo 'd5ed1fa427c54b57dc2ea22cc92de4c7573e5557d962154df92d9535aa982b73  /tmp/interface-foundation.tar.gz' | sha256sum --check --strict

      - name: Validate interface archive
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import tarfile
          from pathlib import Path

          archive = Path('/tmp/interface-foundation.tar.gz')
          with tarfile.open(archive, 'r:gz') as stream:
              names = []
              for member in stream.getmembers():
                  path = Path(member.name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'Unsafe archive member: {member.name}')
                  if member.issym() or member.islnk():
                      raise SystemExit(f'Links are forbidden in payload: {member.name}')
                  names.append(member.name)
              print('\n'.join(names))
          PY

      - name: Extract interface archive
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import tarfile
          with tarfile.open('/tmp/interface-foundation.tar.gz', 'r:gz') as stream:
              stream.extractall('.')
          PY
          rm -f apply-interface-patch.py .interface-payload.part-* .interface-foundation-ready
          git status --short

      - name: Refresh lockfile
        shell: bash
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit generated interface foundation
        shell: bash
        run: |
          set -Eeuo pipefail
          git add --all
          if git diff --cached --quiet; then
            echo 'Generated files are current.'
            exit 0
          fi
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'add guided interface assets and UX specifications'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
